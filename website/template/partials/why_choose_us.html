{% load static %}

<!-- Why Choose Us Features Section -->
<div class="why-choose-us-section py-5 my-4 bg-white rounded-4 shadow-sm border border-light-subtle">
    <div class="container px-4">
        <div class="row g-4 justify-content-center">
            
            <!-- Feature 1: Secure Payment -->
            <div class="col-12 col-sm-6 col-lg-3 scroll-animate">
                <div class="d-flex align-items-center gap-3 p-2 feature-item">
                    <div class="feature-icon-wrapper bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center">
                        <i class="bi bi-shield-check fs-4"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-1 text-dark d-flex align-items-center gap-2">
                            <span class="text-success fw-bold">✓</span> Secure Payment
                        </h6>
                        <p class="text-muted mb-0 fs-8">100% protected checkout & details</p>
                    </div>
                </div>
            </div>

            <!-- Feature 2: Fast Delivery -->
            <div class="col-12 col-sm-6 col-lg-3 scroll-animate delay-1">
                <div class="d-flex align-items-center gap-3 p-2 feature-item">
                    <div class="feature-icon-wrapper bg-warning bg-opacity-10 text-warning rounded-circle d-flex align-items-center justify-content-center">
                        <i class="bi bi-truck fs-4"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-1 text-dark d-flex align-items-center gap-2">
                            <span class="text-success fw-bold">✓</span> Fast Delivery
                        </h6>
                        <p class="text-muted mb-0 fs-8">Express shipping to your doorstep</p>
                    </div>
                </div>
            </div>

            <!-- Feature 3: Easy Returns -->
            <div class="col-12 col-sm-6 col-lg-3 scroll-animate delay-2">
                <div class="d-flex align-items-center gap-3 p-2 feature-item">
                    <div class="feature-icon-wrapper bg-purple bg-opacity-10 text-purple rounded-circle d-flex align-items-center justify-content-center">
                        <i class="bi bi-arrow-left-right fs-4"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-1 text-dark d-flex align-items-center gap-2">
                            <span class="text-success fw-bold">✓</span> Easy Returns
                        </h6>
                        <p class="text-muted mb-0 fs-8">Hassle-free 30-day return policy</p>
                    </div>
                </div>
            </div>

            <!-- Feature 4: 24/7 Support -->
            <div class="col-12 col-sm-6 col-lg-3 scroll-animate delay-3">
                <div class="d-flex align-items-center gap-3 p-2 feature-item">
                    <div class="feature-icon-wrapper bg-info bg-opacity-10 text-info rounded-circle d-flex align-items-center justify-content-center">
                        <i class="bi bi-headset fs-4"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-1 text-dark d-flex align-items-center gap-2">
                            <span class="text-success fw-bold">✓</span> 24/7 Support
                        </h6>
                        <p class="text-muted mb-0 fs-8">Dedicated customer assistance</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
